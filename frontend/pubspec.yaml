name: nafa_edu
description: Nafa Edu — Révise. Apprends. Réussis.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # HTTP
  dio: ^5.4.3

  # Local storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  path: ^1.9.0
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.18

  # File download
  open_filex: ^4.5.1

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0

  # Charts
  fl_chart: ^0.68.0

  # File picker (multi-file, PDF + images)
  file_picker: ^8.1.2

  # In-app PDF reader (works on Android, iOS, Web)
  syncfusion_flutter_pdfviewer: ^33.2.7

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.6
  path_provider: ^2.1.3
  connectivity_plus: ^6.0.3

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.16.0
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
